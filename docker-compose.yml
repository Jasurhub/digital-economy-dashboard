version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/digital_economy.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/years"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
